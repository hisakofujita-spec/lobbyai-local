<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議事録全文検索</title>
  <style>
    /* ── リセット & ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", "Yu Gothic", sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px 32px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 span.icon { font-size: 1.5rem; }
    header p.subtitle {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    /* ── 検索バー ── */
    .search-wrapper {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 20px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .search-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
    }
    .search-row input[type="text"] {
      flex: 1;
      padding: 11px 16px;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .search-row input[type="text"]:focus {
      border-color: #4a6fa5;
    }
    .search-row button {
      padding: 11px 28px;
      font-size: 1rem;
      font-weight: 600;
      background: #4a6fa5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .search-row button:hover { background: #3a5a8c; }
    .search-row button:active { transform: scale(0.97); }

    /* ── メタ情報バー ── */
    .meta-bar {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 16px 0;
      font-size: 0.82rem;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
    }
    .meta-bar .keyword-tag {
      background: #ebf4ff;
      color: #2b6cb0;
      border: 1px solid #bee3f8;
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 600;
    }

    /* ── 結果一覧 ── */
    #results {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 16px 40px;
    }

    .result-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
      position: relative;
    }
    .result-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }

    /* グレードバッジ */
    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0;
      flex-shrink: 0;
    }
    .grade-A { background: #fff0f0; color: #c53030; border: 2px solid #fc8181; }
    .grade-B { background: #fffaf0; color: #b7791f; border: 2px solid #f6ad55; }
    .grade-C { background: #f0fff4; color: #276749; border: 2px solid #68d391; }

    /* カードヘッダ行 */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-header-info { flex: 1; min-width: 0; }

    .municipality {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a202c;
      white-space: nowrap;
    }
    .meeting-info {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 3px;
    }
    .meeting-info .date {
      background: #edf2f7;
      border-radius: 3px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.78rem;
    }
    .meeting-info .meeting-name {
      margin-left: 6px;
    }

    /* スコアバー */
    .score-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      min-width: 52px;
    }
    .score-num {
      font-size: 0.72rem;
      color: #a0aec0;
      font-weight: 600;
    }
    .score-bar-wrap {
      width: 40px;
      height: 5px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #4299e1, #3182ce);
    }
    .grade-A .score-bar-fill { background: linear-gradient(90deg, #fc8181, #e53e3e); }
    .grade-B .score-bar-fill { background: linear-gradient(90deg, #f6ad55, #dd6b20); }

    /* 発言者 */
    .speaker-row {
      font-size: 0.82rem;
      color: #4a5568;
      margin-bottom: 8px;
    }
    .speaker-row .speaker-label {
      color: #a0aec0;
      margin-right: 4px;
    }
    .speaker-name {
      font-weight: 600;
    }

    /* スニペット */
    .snippet {
      font-size: 0.88rem;
      line-height: 1.65;
      color: #2d3748;
      background: #f7fafc;
      border-left: 3px solid #bee3f8;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      word-break: break-all;
    }
    .snippet mark {
      background: #fefcbf;
      color: #744210;
      font-weight: 700;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ソースリンク */
    .source-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: #4a6fa5;
      text-decoration: none;
      word-break: break-all;
    }
    .source-link:hover { text-decoration: underline; }

    /* ── 空状態 / ローディング ── */
    .state-message {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
    }
    .state-message .icon { font-size: 3rem; margin-bottom: 12px; }
    .state-message p { font-size: 0.95rem; }

    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 4px solid #e2e8f0;
      border-top-color: #4a6fa5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DB統計パネル ── */
    #stats-panel {
      max-width: 920px;
      margin: 16px auto 0;
      padding: 0 16px;
    }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat-chip {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: #4a5568;
      white-space: nowrap;
    }
    .stat-chip strong { color: #2b6cb0; }

    /* ── キーワードチップ ── */
    .keyword-chips {
      margin-top: 12px;
      max-width: 860px;
    }
    .keyword-chips-label {
      font-size: 0.72rem;
      color: #a0aec0;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    .keyword-chips-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .chip {
      display: inline-block;
      padding: 4px 12px;
      font-size: 0.8rem;
      border-radius: 20px;
      border: 1px solid;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      font-family: inherit;
      background: #fff;
    }
    .chip-byoji    { color: #2b6cb0; border-color: #bee3f8; }
    .chip-byoji:hover { background: #ebf4ff; }
    .chip-sango    { color: #744210; border-color: #fbd38d; }
    .chip-sango:hover { background: #fffaf0; }
    .chip-hoiku    { color: #276749; border-color: #9ae6b4; }
    .chip-hoiku:hover { background: #f0fff4; }
    .chip-kosodatesien { color: #553c9a; border-color: #d6bcfa; }
    .chip-kosodatesien:hover { background: #faf5ff; }
    .chip-boshi    { color: #97266d; border-color: #fbb6ce; }
    .chip-boshi:hover { background: #fff5f7; }
    .chip-funin    { color: #c05621; border-color: #fbd38d; }
    .chip-funin:hover { background: #fffaf0; }
    .chip-shogai   { color: #234e52; border-color: #81e6d9; }
    .chip-shogai:hover { background: #e6fffa; }
    .chip-hitori   { color: #702459; border-color: #fed7e2; }
    .chip-hitori:hover { background: #fff5f7; }
    .chip-shoshika { color: #2d3a8c; border-color: #c3cfe2; }
    .chip-shoshika:hover { background: #ebf0ff; }
    .chip-ibasho   { color: #7b4f12; border-color: #f6c47e; }
    .chip-ibasho:hover { background: #fffbf0; }

    /* ── 日本地図セクション ── */
    #map-section {
      max-width: 920px;
      margin: 16px auto 0;
      padding: 0 16px;
    }
    .map-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      font-size: 0.82rem;
      color: #4a6fa5;
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
    }
    .map-toggle:hover { text-decoration: underline; }

    #map-container {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      display: none;
      background: #f8fafc;
    }
    #map-container.open { display: block; }

    #japan-map {
      width: 100%;
      min-height: 280px;
      background: #f0f4f8;
      position: relative;
    }
    #japan-map svg { display: block; }

    /* SVG prefecture paths */
    .pref-path {
      transition: fill 0.25s ease;
    }
    .pref-path:hover {
      filter: brightness(0.88);
    }
    .pref-active {
      stroke: #2b6cb0 !important;
      stroke-width: 2px !important;
      filter: brightness(0.85);
    }

    #map-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #718096;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-color {
      width: 14px; height: 14px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.12);
      flex-shrink: 0;
    }
    .map-hint {
      margin-left: auto;
      color: #a0aec0;
      font-size: 0.72rem;
    }

    /* ── 地図ツールチップ ── */
    #map-tooltip {
      position: fixed;
      background: rgba(26, 26, 46, 0.94);
      color: #fff;
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 0.8rem;
      pointer-events: none;
      display: none;
      z-index: 9999;
      max-width: 240px;
      line-height: 1.55;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #map-tooltip strong { font-size: 0.88rem; }

    /* 都道府県フィルターバッジ */
    #pref-filter-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background: #ebf4ff;
      border: 1px solid #bee3f8;
      border-radius: 20px;
      padding: 3px 10px 3px 12px;
      font-size: 0.78rem;
      color: #2b6cb0;
    }
    #pref-filter-badge.active { display: inline-flex; }
    #pref-filter-badge button {
      background: none; border: none; cursor: pointer;
      color: #718096; font-size: 0.85rem; padding: 0 2px; line-height: 1;
    }
    #pref-filter-badge button:hover { color: #e53e3e; }

    /* ── レスポンシブ ── */
    @media (max-width: 600px) {
      header { padding: 18px 16px; }
      .search-wrapper { padding: 14px 16px; }
      .search-row button { padding: 11px 16px; }
      .card-header { flex-wrap: wrap; }
      .score-area { flex-direction: row; min-width: auto; }
      .map-hint { display: none; }
    }
  </style>
</head>
<body>

</div>

      <button class="chip chip-hitori" onclick="searchChip('子ども医療費')">子ども医療費</button>
      <button class="chip chip-hitori" onclick="searchChip('育児休業')">育児休業</button>
      <button class="chip chip-hitori" onclick="searchChip('児童扶養手当')">児童扶養手当</button>
      <button class="chip chip-hitori" onclick="searchChip('就学援助')">就学援助</button>
      <button class="chip chip-hitori" onclick="searchChip('子どもの貧困')">子どもの貧困</button>
    </div>
    <div class="keyword-chips-label">少子化対策</div>
    <div class="keyword-chips-group">
      <button class="chip chip-shoshika" onclick="searchChip('少子化対策')">少子化対策</button>
      <button class="chip chip-shoshika" onclick="searchChip('合計特殊出生率')">合計特殊出生率</button>
      <button class="chip chip-shoshika" onclick="searchChip('移住定住')">移住定住</button>
      <button class="chip chip-shoshika" onclick="searchChip('結婚支援')">結婚支援</button>
      <button class="chip chip-shoshika" onclick="searchChip('第3子以降')">第3子以降</button>
      <button class="chip chip-shoshika" onclick="searchChip('こどもまんなか')">こどもまんなか</button>
      <button class="chip chip-shoshika" onclick="searchChip('こども計画')">こども計画</button>
    </div>
    <div class="keyword-chips-label">こどもの居場所</div>
    <div class="keyword-chips-group">
      <button class="chip chip-ibasho" onclick="searchChip('子ども食堂')">子ども食堂</button>
      <button class="chip chip-ibasho" onclick="searchChip('学習支援')">学習支援</button>
      <button class="chip chip-ibasho" onclick="searchChip('居場所づくり')">居場所づくり</button>
      <button class="chip chip-ibasho" onclick="searchChip('児童館')">児童館</button>
      <button class="chip chip-ibasho" onclick="searchChip('放課後子ども教室')">放課後子ども教室</button>
      <button class="chip chip-ibasho" onclick="searchChip('フードバンク')">フードバンク</button>
    </div>
  </div>
</div>

<div id="stats-panel"></div>

<div id="map-section">
  <button class="map-toggle" onclick="toggleMap()">
    <span id="map-toggle-icon">▼</span> 日本地図で表示
  </button>
  <div id="map-container" class="open">
    <div id="japan-map">
      <div style="display:flex;align-items:center;justify-content:center;height:280px;gap:12px;color:#a0aec0;font-size:0.88rem">
        <div class="spinner" style="margin:0;width:24px;height:24px;border-width:3px"></div>地図を読み込み中…
      </div>
    </div>
    <div id="map-legend">
      <span class="legend-item"><span class="legend-color" style="background:#e2e8f0"></span>データなし</span>
      <span class="legend-item"><span class="legend-color" style="background:#bee3f8"></span>収録少</span>
      <span class="legend-item"><span class="legend-color" style="background:#3182ce"></span>収録多</span>
      <span class="legend-item"><span class="legend-color" style="background:#e53e3e;border-color:#c53030"></span>検索ヒット</span>
      <span class="map-hint">都道府県をクリックで絞り込み</span>
    </div>
  </div>
</div>

<div class="meta-bar" id="meta-bar">
  <span id="pref-filter-badge">
    <span id="pref-filter-name"></span>
    <button onclick="clearPrefFilter()" title="絞り込みを解除">✕</button>
  </span>
</div>
<div id="results">
  <div class="state-message" id="initial-state">
    <div class="icon">📋</div>
    <p>キーワードを入力して検索してください</p>
  </div>
</div>

<!-- 地図ツールチップ -->
<div id="map-tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
  // ── 都道府県コード → 日本語名 ──
  const PREF_CODE_TO_JAM = {
    "01":"北海道","02":"青森県","03":"岩手県","04":"宮城県","05":"秋田県",
    "06":"山形県","07":"福島県","08":"茨城県","09":"栃木県","10":"群馬県",
    "11":"埼玉県","12":"千葉県","13":"東京都","14":"神奈川県","15":"新潟県",
    "16":"富山県","17":"石川県","18":"福井県","19":"山梨県","20":"長野県",
    "21":"岐阜県","22":"静岡県","23":"愛知県","24":"三重県","25":"滋賀県",
    "26":"京都府","27":"大阪府","28":"兵庫県","29":"奈良県","30":"和歌山県",
    "31":"鳥取県","32":"島根県","33":"岡山県","34":"広島県","35":"山口県",
    "36":"徳島県","37":"香川県","38":"愛媛県","39":"高知県","40":"福岡県",
    "41":"佐賀県","42":"長崎県","43":"熊本県","44":"大分県","45":"宮崎県",
    "46":"鹿児島県","47":"沖縄県"
  };
  const JAM_TO_CODE = {};
  for (const [k, v] of Object.entries(PREF_CODE_TO_JAM)) JAM_TO_CODE[v] = k;

  // ── 状態 ──
  let svgMap      = null;
  let d3PathGroup = null;
  let prefStats   = {};
  let hitCodes    = new Set();
  let allResults  = [];
  let lastQuery   = '';
  let activePrefCode = null;

  const MAP_W = 900;
  const MAP_H = 320;

  // ── 色計算 ──
  function getColor(code) {
    if (hitCodes.size > 0 && hitCodes.has(code)) return '#e53e3e';
    const data = prefStats[code];
    if (!data) return '#dde3ec';
    const t = data.total;
    if (t >= 10000) return '#1a56a0';
    if (t >= 5000)  return '#2b6cb0';
    if (t >= 2000)  return '#3182ce';
    if (t >= 500)   return '#63b3ed';
    return '#bee3f8';
  }

  function featureCode(feature) {
    const nam_ja = feature.properties.nam_ja || '';
    if (JAM_TO_CODE[nam_ja]) return JAM_TO_CODE[nam_ja];
    const id = feature.properties.id;
    if (id) return String(id).padStart(2, '0');
    return '';
  }

  // ── D3 地図初期化 ──
  async function initMap() {
    if (svgMap) return;

    let geojson;
    try {
      const [statsRes, geoRes] = await Promise.all([
        fetch('/prefecture-stats'),
        fetch('https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson')
      ]);
      const statsData = await statsRes.json();
      prefStats = statsData.by_prefecture || {};
      geojson = await geoRes.json();
    } catch(e) {
      document.getElementById('japan-map').innerHTML =
        '<div style="padding:60px;text-align:center;color:#a0aec0;font-size:0.88rem">地図の読み込みに失敗しました</div>';
      return;
    }

    const mapEl = document.getElementById('japan-map');
    mapEl.innerHTML = '';

    const projection = d3.geoMercator().fitSize([MAP_W, MAP_H], geojson);
    const pathGen    = d3.geoPath().projection(projection);

    svgMap = d3.select('#japan-map')
      .append('svg')
      .attr('viewBox', `0 0 ${MAP_W} ${MAP_H}`)
      .attr('width', '100%')
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('display', 'block');

    // 薄い背景
    svgMap.append('rect')
      .attr('width', MAP_W).attr('height', MAP_H)
      .attr('fill', '#eef2f7');

    d3PathGroup = svgMap.append('g').attr('class', 'prefectures');

    d3PathGroup.selectAll('path')
      .data(geojson.features)
      .enter().append('path')
      .attr('class', 'pref-path')
      .attr('d', pathGen)
      .attr('fill', d => getColor(featureCode(d)))
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.6)
      .attr('cursor', 'pointer')
      .on('mouseover', function(event, d) {
        if (!d3.select(this).classed('pref-active')) {
          d3.select(this).attr('stroke', '#2b6cb0').attr('stroke-width', 1.8).raise();
        }
        showMapTooltip(event, d);
      })
      .on('mousemove', moveMapTooltip)
      .on('mouseout', function(event, d) {
        if (!d3.select(this).classed('pref-active')) {
          d3.select(this).attr('stroke', '#fff').attr('stroke-width', 0.6);
        }
        hideMapTooltip();
      })
      .on('click', function(event, d) {
        const code = featureCode(d);
        const name = d.properties.nam_ja || PREF_CODE_TO_JAM[code] || '';
        handlePrefClick(code, name, this);
      });
  }

  function refreshMap() {
    if (!d3PathGroup) return;
    d3PathGroup.selectAll('path.pref-path')
      .attr('fill', d => getColor(featureCode(d)));
  }

  // ── ツールチップ ──
  function showMapTooltip(event, d) {
    const code = featureCode(d);
    const name = d.properties.nam_ja || PREF_CODE_TO_JAM[code] || '';
    const stat = prefStats[code];

    let html = `<strong>${name}</strong>`;

    if (hitCodes.size > 0 && hitCodes.has(code)) {
      const n = allResults.filter(r => r.prefecture_code === code).length;
      html += `<br><span style="color:#fc8181">検索ヒット ${n}件</span>`;
    }

    if (stat) {
      html += `<br><span style="color:#90cdf4">収録 ${stat.total.toLocaleString()}件</span>`;
      const munis = stat.municipalities
        .map(m => `${m.name}：${m.count.toLocaleString()}件`)
        .join('<br>');
      html += `<br><small style="color:#a0aec0;line-height:1.4">${munis}</small>`;
    } else {
      html += `<br><span style="color:#718096">データなし</span>`;
    }

    if (allResults.length > 0) {
      html += `<br><small style="color:#4a6fa5;margin-top:2px;display:block">クリックで絞り込み</small>`;
    }

    const tip = document.getElementById('map-tooltip');
    tip.innerHTML = html;
    tip.style.display = 'block';
    moveMapTooltip(event);
  }

  function moveMapTooltip(event) {
    const tip = document.getElementById('map-tooltip');
    const x = event.clientX + 14;
    const y = event.clientY - 10;
    tip.style.left = Math.min(x, window.innerWidth - tip.offsetWidth - 8) + 'px';
    tip.style.top  = Math.max(y, 8) + 'px';
  }

  function hideMapTooltip() {
    document.getElementById('map-tooltip').style.display = 'none';
  }

  // ── 都道府県クリックで絞り込み ──
  function handlePrefClick(code, name, pathEl) {
    if (!allResults.length) return;

    if (activePrefCode === code) {
      clearPrefFilter();
      return;
    }

    // 前の選択解除
    if (d3PathGroup) {
      d3PathGroup.selectAll('path.pref-path')
        .classed('pref-active', false)
        .attr('stroke', '#fff').attr('stroke-width', 0.6);
    }

    activePrefCode = code;
    d3.select(pathEl)
      .classed('pref-active', true)
      .attr('stroke', '#2b6cb0').attr('stroke-width', 2)
      .raise();

    const filtered = allResults.filter(r => r.prefecture_code === code);
    renderResults(filtered);
    updateMeta(lastQuery, name, filtered.length);

    // フィルターバッジ表示
    document.getElementById('pref-filter-name').textContent = name;
    document.getElementById('pref-filter-badge').classList.add('active');

    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }

  function clearPrefFilter() {
    activePrefCode = null;
    document.getElementById('pref-filter-badge').classList.remove('active');

    if (d3PathGroup) {
      d3PathGroup.selectAll('path.pref-path')
        .classed('pref-active', false)
        .attr('stroke', '#fff').attr('stroke-width', 0.6);
    }

    if (allResults.length > 0) {
      renderResults(allResults);
      updateMeta(lastQuery, null, allResults.length);
    }
  }

  function toggleMap() {
    const container = document.getElementById('map-container');
    const icon      = document.getElementById('map-toggle-icon');
    if (container.classList.contains('open')) {
      container.classList.remove('open');
      icon.textContent = '▶';
    } else {
      container.classList.add('open');
      icon.textContent = '▼';
      initMap();
    }
  }

  // ── Enter キーで検索 ──
  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // ── チップクリックで検索 ──
  function searchChip(keyword) {
    document.getElementById('query').value = keyword;
    doSearch();
  }

  // ── DB統計を初期表示 ──
  async function loadStats() {
    try {
      const res  = await fetch('/stats');
      const data = await res.json();
      const panel = document.getElementById('stats-panel');
      const chips = data.by_municipality.map(m =>
        `<span class="stat-chip">${m.name} <strong>${m.count.toLocaleString()}</strong>件</span>`
      ).join('');
      panel.innerHTML = `
        <details>
          <summary style="cursor:pointer;font-size:0.8rem;color:#718096;padding:4px 0;margin-bottom:6px;">
            収録データ：計 <strong style="color:#2b6cb0">${data.total.toLocaleString()}</strong> 件（クリックで内訳）
          </summary>
          <div class="stats-grid">${chips}</div>
        </details>`;
    } catch(e) {}
  }

  loadStats();
  initMap(); // ページ読み込み時に地図を初期表示

  // ── 検索実行 ──
  async function doSearch() {
    const query = document.getElementById('query').value.trim();
    if (!query) return;

    // 状態リセット
    activePrefCode = null;
    allResults     = [];
    lastQuery      = query;
    document.getElementById('pref-filter-badge').classList.remove('active');
    if (d3PathGroup) {
      d3PathGroup.selectAll('path.pref-path')
        .classed('pref-active', false)
        .attr('stroke', '#fff').attr('stroke-width', 0.6);
    }

    const metaEl = document.getElementById('meta-bar');
    document.getElementById('results').innerHTML = `
      <div class="state-message">
        <div class="spinner"></div>
        <p>検索中…</p>
      </div>`;
    metaEl.innerHTML = '<span id="pref-filter-badge"><span id="pref-filter-name"></span><button onclick="clearPrefFilter()" title="絞り込みを解除">✕</button></span>';

    try {
      const res  = await fetch('/search?q=' + encodeURIComponent(query));
      const data = await res.json();

      if (data.error) {
        document.getElementById('results').innerHTML =
          `<div class="state-message"><div class="icon">⚠️</div><p>${escHtml(data.error)}</p></div>`;
        return;
      }

      if (data.results.length === 0) {
        hitCodes = new Set();
        refreshMap();
        updateMeta(query, null, 0);
        document.getElementById('results').innerHTML = `
          <div class="state-message">
            <div class="icon">🔍</div>
            <p>該当する議事録が見つかりませんでした。<br>3文字以上のキーワードで再検索してください。</p>
          </div>`;
        return;
      }

      allResults = data.results;
      hitCodes   = new Set(allResults.map(r => r.prefecture_code).filter(Boolean));
      refreshMap();
      updateMeta(query, null, allResults.length);
      renderResults(allResults);
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch(e) {
      document.getElementById('results').innerHTML =
        `<div class="state-message"><div class="icon">❌</div><p>通信エラーが発生しました。</p></div>`;
    }
  }

  function updateMeta(query, prefName, count) {
    const badge = document.getElementById('pref-filter-badge');
    const nameEl = document.getElementById('pref-filter-name');
    const metaEl = document.getElementById('meta-bar');

    // バッジの状態を維持しつつ件数テキスト更新
    const prefPart = prefName
      ? `<span id="pref-filter-badge" class="active"><span id="pref-filter-name">${escHtml(prefName)}</span><button onclick="clearPrefFilter()" title="絞り込みを解除">✕</button></span> `
      : `<span id="pref-filter-badge"><span id="pref-filter-name"></span><button onclick="clearPrefFilter()" title="絞り込みを解除">✕</button></span>`;
    metaEl.innerHTML = `${prefPart}「<span class="keyword-tag">${escHtml(query)}</span>」の検索結果：<strong>${count}</strong>件`;
  }

  // ── 結果描画 ──
  function renderResults(results) {
    const el = document.getElementById('results');
    if (results.length === 0) {
      el.innerHTML = `
        <div class="state-message">
          <div class="icon">🔍</div>
          <p>この都道府県に該当する結果はありません。</p>
        </div>`;
      return;
    }
    el.innerHTML = results.map(r => buildCard(r, lastQuery)).join('');
  }

  // ── カードHTML生成 ──
  function buildCard(r, query) {
    const gradeClass = 'grade-' + r.grade;
    const snippet    = highlightKeywords(escHtml(r.snippet), query);
    const sourceLink = r.source_url
      ? `<a class="source-link" href="${escHtml(r.source_url)}" target="_blank" rel="noopener">🔗 ${escHtml(r.source_url)}</a>`
      : '';

    return `
    <div class="result-card">
      <div class="card-header">
        <div class="grade-badge ${gradeClass}" title="優先度グレード ${r.grade}">${r.grade}</div>
        <div class="card-header-info">
          <div class="municipality">${escHtml(r.municipality_name)}</div>
          <div class="meeting-info">
            <span class="date">${escHtml(r.meeting_date)}</span>
            <span class="meeting-name">${escHtml(r.meeting_name)}</span>
          </div>
        </div>
        <div class="score-area">
          <span class="score-num">${r.score}pt</span>
          <div class="score-bar-wrap">
            <div class="score-bar-fill ${gradeClass}" style="width:${r.score}%"></div>
          </div>
        </div>
      </div>
      ${r.speaker !== '—'
        ? `<div class="speaker-row"><span class="speaker-label">発言者</span><span class="speaker-name">${escHtml(r.speaker)}</span></div>`
        : ''}
      <div class="snippet">${snippet}</div>
      ${sourceLink}
    </div>`;
  }

  // ── キーワードハイライト ──
  function highlightKeywords(html, query) {
    const words = query.split(/\s+/).filter(w => w.length > 0);
    words.sort((a, b) => b.length - a.length);
    for (const word of words) {
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      html = html.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
    }
    return html;
  }

  // ── HTML エスケープ ──
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
