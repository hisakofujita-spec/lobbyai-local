name: 議事録定期更新

on:
  schedule:
    # 毎週月曜 AM6:00 JST = 日曜 21:00 UTC
    - cron: "0 21 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（スクレイプをスキップ）"
        required: false
        default: "false"
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージのインストール
        run: pip install -r scripts/requirements.txt

      - name: DB キャッシュの復元
        uses: actions/cache@v4
        with:
          path: |
            db/minutes.db
            data/raw
            data/parsed
          key: lobbyai-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            lobbyai-data-${{ runner.os }}-

      - name: ディレクトリ作成
        run: mkdir -p db data/raw data/parsed reports logs

      - name: survey_report.csv が存在しない場合は調査を実行
        run: |
          if [ ! -f reports/survey_report.csv ]; then
            echo "survey_report.csv が見つかりません。01_survey.py を実行します..."
            python scripts/01_survey.py
          else
            echo "survey_report.csv を使用します"
          fi

      - name: パイプライン実行
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: python scripts/06_scheduler.py

      - name: ログのアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: DB・データのキャッシュ保存
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            db/minutes.db
            data/raw
            data/parsed
          key: lobbyai-data-${{ runner.os }}-${{ github.run_id }}
